<!DOCTYPE html>
<html lang="en" data-page-title-key="page_title_admin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b120d" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Redirect page for the admin workspace inside the Bicol Indigenous Peoples Hub profile dashboard." />
  <title>Admin Workspace | Bicol Indigenous Peoples Hub</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <meta http-equiv="refresh" content="0; url=profile.html" />
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand" style="justify-content:center; margin-bottom: 18px;">
        <span class="brand-mark" aria-hidden="true">
          <img
            src="./brand-mark.png"
            alt="Bicol Indigenous Peoples Hub Logo"
            width="512"
            height="512"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
        </span>
      </div>
      <a href="profile.html" class="back-link">Open Profile Workspace</a>
      <h2 data-i18n="admin_tools_moved">Admin tools moved</h2>
      <p class="hint" data-i18n="admin_redirect_hint1">The admin workspace now lives inside your profile dashboard for faster access and a cleaner main site.</p>
      <p class="hint" data-i18n="admin_redirect_hint2">If you are not redirected automatically, use the button below.</p>
      <a href="profile.html" class="solid full" style="display:inline-flex;justify-content:center;text-decoration:none;" data-i18n="go_to_profile_dashboard">Go to Profile Dashboard</a>
    </div>
  </div>
  <script type="module" src="./adminPage.js"></script>
</body>
</html>
