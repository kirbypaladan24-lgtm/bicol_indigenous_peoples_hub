<!DOCTYPE html>
<html lang="en" data-page-title-key="page_title_signup">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b120d" />
  <meta name="color-scheme" content="dark light" />
  <script>
    (() => {
      const THEME_KEY = "bicol-ip-theme";
      let theme = "dark";
      try {
        const stored = localStorage.getItem(THEME_KEY);
        if (stored === "light" || stored === "dark") {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          theme = "light";
        }
      } catch (_error) {}
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute("content", theme === "light" ? "#f6f6f1" : "#0b120d");
      }
    })();
  </script>
  <meta name="description" content="Create an account to share verified stories, photos, and cultural knowledge in the Bicol Indigenous Peoples Hub." />
  <title>Create Account | Bicol IP Hub</title>
  <link rel="icon" type="image/png" href="./favicon.png" sizes="64x64" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .birthdate-field {
      position: relative;
    }

    .birthdate-input {
      font-family: "Sora", monospace;
      letter-spacing: 0.05em;
      font-size: 16px;
    }

    .birthdate-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .birthdate-input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .birthdate-input.valid {
      border-color: var(--accent-2) !important;
      box-shadow: 0 0 0 2px rgba(90, 154, 106, 0.2);
    }

    .birthdate-input.invalid {
      border-color: #c0392b !important;
      box-shadow: 0 0 0 2px rgba(192, 57, 43, 0.2);
    }

    .birthdate-error {
      font-size: 12px;
      color: #c0392b;
      margin-top: 4px;
      display: none;
    }

    .birthdate-error.show {
      display: block;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand" style="justify-content:center; margin-bottom: 18px;">
        <span class="brand-mark" aria-hidden="true">
          <img
            src="./brand-mark.png"
            alt="Bicol Indigenous Peoples Hub Logo"
            width="512"
            height="512"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
        </span>
      </div>
      <a href="index.html" class="back-link" data-i18n="back_to_home">Back to Home</a>
      <h2 data-i18n="create_your_account">Create your account</h2>
      <p class="hint" data-i18n="access_across_devices">Access across devices with the same credentials.</p>
      <form id="signupForm" class="form">
        <label data-i18n="username">Username</label>
        <input type="text" id="usernameInput" placeholder="Your name" data-i18n-placeholder="your_name_placeholder" required />

        <label data-i18n="phone_number">Phone Number</label>
        <input type="tel" id="phoneInput" placeholder="+63 9XX XXX XXXX" data-i18n-placeholder="phone_placeholder" required />

        <label data-i18n="birthdate">Birthdate</label>
        <div class="birthdate-field">
          <input
            type="text"
            id="birthdateInput"
            class="birthdate-input"
            placeholder="MM/DD/YYYY"
            data-i18n-placeholder="birthdate_placeholder"
            maxlength="10"
            inputmode="numeric"
            autocomplete="off"
            required
          />
          <p class="birthdate-hint" data-i18n="birthdate_hint">Type your birthdate (e.g., 12/25/1995)</p>
          <p
            class="birthdate-error"
            id="birthdateError"
            data-i18n="birthdate_error_invalid"
            data-invalid-message="Please enter a valid date"
            data-complete-message="Please complete the date (MM/DD/YYYY)"
          >Please enter a valid date</p>
        </div>

        <label data-i18n="email">Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" data-i18n-placeholder="email_placeholder" required />

        <label data-i18n="password">Password</label>
        <div class="password-field">
          <input type="password" id="passwordInput" placeholder="********" data-i18n-placeholder="password_placeholder" required />
          <button type="button" class="toggle-pass" id="toggleSignupPass" aria-label="Show password" data-i18n="show" data-i18n-aria-label="show">Show</button>
        </div>

        <button type="submit" class="solid full" data-i18n="create_account">Create Account</button>
        <p class="hint" data-i18n="already_have_account">Already have an account? Login</p>
      </form>
      <div id="signupToast" class="toast hidden"></div>
    </div>
  </div>

  <script>
    (function() {
      const birthdateInput = document.getElementById("birthdateInput");
      const birthdateError = document.getElementById("birthdateError");

      function formatBirthdate(value) {
        const digits = value.replace(/\D/g, "");

        let formatted = "";
        if (digits.length >= 1) {
          formatted = digits.substring(0, 2);
        }
        if (digits.length >= 3) {
          formatted += "/" + digits.substring(2, 4);
        }
        if (digits.length >= 5) {
          formatted += "/" + digits.substring(4, 8);
        }

        return formatted;
      }

      function validateDate(value) {
        if (!value || value.length !== 10) return false;

        const parts = value.split("/");
        if (parts.length !== 3) return false;

        const month = parseInt(parts[0], 10);
        const day = parseInt(parts[1], 10);
        const year = parseInt(parts[2], 10);

        if (month < 1 || month > 12) return false;
        if (day < 1 || day > 31) return false;
        if (year < 1900 || year > new Date().getFullYear()) return false;

        const daysInMonth = new Date(year, month, 0).getDate();
        if (day > daysInMonth) return false;

        const inputDate = new Date(year, month - 1, day);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        if (inputDate > today) return false;

        return true;
      }

      birthdateInput.addEventListener("input", function() {
        const cursorPosition = this.selectionStart;
        const oldValue = this.value;
        const newValue = formatBirthdate(this.value);

        if (oldValue !== newValue) {
          this.value = newValue;

          if (cursorPosition === oldValue.length) {
            this.setSelectionRange(newValue.length, newValue.length);
          }
        }

        if (this.value.length === 10) {
          if (validateDate(this.value)) {
            this.classList.add("valid");
            this.classList.remove("invalid");
            birthdateError.classList.remove("show");
          } else {
            this.classList.add("invalid");
            this.classList.remove("valid");
            birthdateError.classList.add("show");
          }
        } else {
          this.classList.remove("valid", "invalid");
          birthdateError.classList.remove("show");
        }
      });

      birthdateInput.addEventListener("keydown", function(e) {
        if ([8, 46, 9, 27, 13, 37, 38, 39, 40].indexOf(e.keyCode) !== -1 ||
            (e.keyCode === 65 && e.ctrlKey) ||
            (e.keyCode === 67 && e.ctrlKey) ||
            (e.keyCode === 86 && e.ctrlKey) ||
            (e.keyCode === 88 && e.ctrlKey) ||
            (e.keyCode >= 35 && e.keyCode <= 39)) {
          return;
        }

        if ((e.keyCode < 48 || e.keyCode > 57) && (e.keyCode < 96 || e.keyCode > 105)) {
          e.preventDefault();
        }
      });

      birthdateInput.addEventListener("paste", function(e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData("text");
        const digits = pasted.replace(/\D/g, "").substring(0, 8);
        this.value = formatBirthdate(digits);

        if (this.value.length === 10) {
          if (validateDate(this.value)) {
            this.classList.add("valid");
            this.classList.remove("invalid");
            birthdateError.classList.remove("show");
          } else {
            this.classList.add("invalid");
            this.classList.remove("valid");
            birthdateError.classList.add("show");
          }
        }
      });

      birthdateInput.addEventListener("blur", function() {
        if (this.value && this.value.length < 10) {
          this.classList.add("invalid");
          this.classList.remove("valid");
          birthdateError.textContent = birthdateError.dataset.completeMessage || "Please complete the date (MM/DD/YYYY)";
          birthdateError.classList.add("show");
        }
      });

      birthdateInput.addEventListener("focus", function() {
        if (this.classList.contains("invalid")) {
          birthdateError.textContent = birthdateError.dataset.invalidMessage || "Please enter a valid date";
        }
      });
    })();
  </script>

  <script src="/api/runtime-config.js"></script>
  <script type="module" src="./signup.js"></script>
</body>
</html>
