<!DOCTYPE html>
<html lang="en" data-page-title-key="page_title_landmark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b120d" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Read the story and context behind a mapped Indigenous landmark in the Bicol Indigenous Peoples Hub." />
  <title>Landmark | Bicol IP Hub</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <img src="./brand-mark.png" alt="Bicol Indigenous Peoples Hub Logo" />
      </span>
      <div>
        <h1 data-i18n="page_title">Bicol Indigenous Peoples Hub</h1>
        <p data-i18n="landmark_header_label">Landmark</p>
      </div>
    </div>
    <div class="auth-cta">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="toggle-thumb"></span>
        <span class="toggle-icon sun">☀︎</span>
        <span class="toggle-icon moon">☾</span>
      </button>
      <a href="index.html#map" class="ghost small" data-i18n="back_to_map">Back to Map</a>
    </div>
  </header>

  <main class="section landmark-page">
    <div class="landmark-hero-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow" data-i18n="landmark_eyebrow">Indigenous Community</p>
          <h2 id="landmarkTitleMain">Landmark</h2>
          <p class="section-desc" data-i18n="landmark_desc">A closer look at one mapped place, its setting, and the story connected to it.</p>
        </div>
      </div>
      <div id="landmarkCover" class="hero-card landmark-cover" style="display:none;"></div>
    </div>
    <div id="landmarkSummary" class="post-body landmark-summary landmark-summary-card"></div>
  </main>

  <div id="toast" class="toast hidden" aria-live="polite"></div>

  <script src="/api/runtime-config.js"></script>
  <script type="module" src="./landmark.js"></script>
</body>
</html>
